apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab2-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DauletZhamanbaev/k8s-kanban.git
    targetRevision: HEAD
    path: gitops/labs/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true