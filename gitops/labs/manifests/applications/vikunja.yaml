apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vikunja
  namespace: argocd
spec:
  project: default

  source:
    repoURL: oci://ghcr.io/go-vikunja/helm-chart/vikunja
    targetRevision: 2.0.2
    path: .
    helm:
      valuesObject:
        vikunja:
          ingress:
            main:
              enabled: false   
          persistence:
            data:
              enabled: true
              size: 2Gi
          configMaps:
            config:
              enabled: true
              data:
                config.yml:
                  service:
                    enableregistration: false
                  files:
                    maxsize: "50MB"

  destination:
    server: https://kubernetes.default.svc
    namespace: vikunja

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true